# Deploy the ENGLISH edition to GitHub Pages (gh-pages branch).
#
# Isolation guarantees (the Chinese site must be unaffected):
#   - Builds with `-f mkdocs.en.yml`; never touches mkdocs.yml or the Chinese build.
#   - Publishes to the `gh-pages` branch only; the Chinese site is on a separate
#     server (Tencent, via deploy.yml + rsync) and shares nothing with Pages.
#   - This workflow file does not exist on master, so master pushes never see it.
#
# Auto-deploys the English site on pushes to master that touch English build inputs
# (docs-en/, mkdocs.en.yml, the shared version hook, or the shared assets under docs/).
# Chinese-only content changes do NOT trigger it — that keeps the footer version stamp
# honest: the English sha only advances when the English site is actually rebuilt, so a
# lag between the two sites' shas signals a translation that hasn't caught up yet.
# workflow_dispatch stays available for manual redeploys.
#
# Live since 2026-07-14: Settings -> Pages -> gh-pages branch, custom domain
# en.learn-robotics.qqfly.net (CNAME in docs-en/, Let's Encrypt cert, Enforce HTTPS on).

name: deploy-en

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "docs-en/**"
      - "mkdocs.en.yml"
      - "hooks/**"
      - "requirements-en.txt"
      - "docs/images/**"
      - "docs/stylesheets/**"
      - "docs/javascripts/**"
      - ".github/workflows/deploy-en.yml"

# Only one English deploy at a time; a newer run cancels an in-progress one.
concurrency:
  group: deploy-en
  cancel-in-progress: true

permissions:
  contents: write   # gh-deploy pushes the built site to the gh-pages branch

jobs:
  deploy-en:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-en.txt

      - name: Sync shared assets (images / stylesheets / mathjax) into docs-en/
        run: rsync -a docs/images docs/stylesheets docs/javascripts docs-en/

      - name: Configure git identity for gh-deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build (strict) and deploy to gh-pages
        run: mkdocs gh-deploy --config-file mkdocs.en.yml --strict --force
