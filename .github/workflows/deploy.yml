# 自动部署：push 到 master → mkdocs build --strict → rsync 到腾讯云轻量服务器。
#
# Secrets 与 qqfly/homepage 仓库同名同义（同一台服务器可直接复用同样的值）：
#   DEPLOY_HOST   服务器地址（IP）
#   DEPLOY_USER   SSH 用户名
#   DEPLOY_KEY    SSH 私钥全文（对应公钥须在服务器 authorized_keys 中）
#   DEPLOY_PORT   SSH 端口（可选，默认 22）
#
# 一行命令配置（在本机）：
#   gh secret set DEPLOY_USER -R qqfly/how-to-learn-robotics --body "<用户名>"
#   gh secret set DEPLOY_KEY  -R qqfly/how-to-learn-robotics < <私钥文件路径>
name: deploy

on:
  push:
    branches: [master]
    # Only redeploy the Chinese site when its own build inputs change; English-only
    # commits (docs-en/, mkdocs.en.yml) don't touch this site. Covers everything
    # `mkdocs build` reads: docs/ (content + shared assets), config, hook, deps.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "hooks/**"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# 同一时间只跑一个部署；新 push 到来时取消进行中的旧部署
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          : "${DEPLOY_HOST:?missing secret DEPLOY_HOST}"
          : "${DEPLOY_USER:?missing secret DEPLOY_USER}"
          : "${DEPLOY_KEY:?missing secret DEPLOY_KEY}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site (strict)
        run: |
          pip install -r requirements.txt
          mkdocs build --strict

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        run: |
          # Web 根目录须与服务器 Caddy 站点块的 root 一致：/var/www/learn-robotics
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22} -o StrictHostKeyChecking=yes" \
            site/ "${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/learn-robotics/"
