<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, 'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
     fill="none" stroke="#2b3440" stroke-width="1.6">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b3440" stroke="none"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d64550" stroke="none"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="360" fill="#ffffff"/>

  <!-- reference input, with a branch node feeding the feedforward -->
  <text x="8" y="204" font-size="14" fill="#2b3440" stroke="none">设定值 r(t)</text>
  <line x1="96" y1="200" x2="157" y2="200"/>
  <circle cx="120" cy="200" r="2.6" fill="#2b3440" stroke="none"/>

  <!-- summing junction 1 -->
  <circle cx="175" cy="200" r="18" fill="#d6e8fb" stroke="#2b6cb0"/>
  <text x="175" y="206" font-size="17" text-anchor="middle" fill="#2b3440" stroke="none">Σ</text>
  <text x="152" y="190" font-size="13" fill="#2b3440" stroke="none">+</text>
  <text x="182" y="230" font-size="13" fill="#2b3440" stroke="none">−</text>

  <!-- error node -->
  <line x1="193" y1="200" x2="250" y2="200"/>
  <text x="205" y="192" font-size="13" fill="#2b3440" stroke="none">误差 e</text>
  <circle cx="250" cy="200" r="2.6" fill="#2b3440" stroke="none"/>
  <line x1="250" y1="140" x2="250" y2="260"/>

  <!-- feedforward path (from setpoint, NOT error), highlighted red -->
  <line x1="120" y1="200" x2="120" y2="70" stroke="#d64550" stroke-width="2.4"/>
  <line x1="120" y1="70" x2="300" y2="70" stroke="#d64550" stroke-width="2.4" marker-end="url(#arRed)"/>
  <rect x="300" y="52" width="232" height="36" rx="4" fill="#eceff3" stroke="#718096"/>
  <text x="416" y="75" font-size="13" text-anchor="middle" fill="#2b3440" stroke="none">动力学前馈（Computed Torque）</text>
  <line x1="532" y1="70" x2="626" y2="70" stroke="#d64550" stroke-width="2.4"/>
  <line x1="626" y1="70" x2="626" y2="182" stroke="#d64550" stroke-width="2.4" marker-end="url(#arRed)"/>

  <!-- P / I / D blocks -->
  <line x1="250" y1="140" x2="330" y2="140" marker-end="url(#ar)"/>
  <rect x="330" y="122" width="196" height="36" rx="4" fill="#fdf3c0" stroke="#b8960c"/>
  <text x="346" y="145" font-size="15" font-weight="bold" fill="#2b3440" stroke="none">P</text>
  <text x="376" y="145" font-size="13" fill="#2b3440" stroke="none">K<tspan baseline-shift="-24%" font-size="9.5">p</tspan><tspan baseline-shift="0"> · e(t)</tspan></text>

  <line x1="250" y1="200" x2="330" y2="200" marker-end="url(#ar)"/>
  <rect x="330" y="182" width="196" height="36" rx="4" fill="#d8efd2" stroke="#4e944f"/>
  <text x="346" y="205" font-size="15" font-weight="bold" fill="#2b3440" stroke="none">I</text>
  <text x="376" y="205" font-size="13" fill="#2b3440" stroke="none">K<tspan baseline-shift="-24%" font-size="9.5">i</tspan><tspan baseline-shift="0"> · </tspan><tspan font-size="20">∫</tspan><tspan baseline-shift="52%" font-size="9">t</tspan><tspan baseline-shift="-30%" dx="-5" font-size="9">0</tspan><tspan baseline-shift="0" dx="1"> e(τ) dτ</tspan></text>

  <line x1="250" y1="260" x2="330" y2="260" marker-end="url(#ar)"/>
  <rect x="330" y="242" width="196" height="36" rx="4" fill="#fde1bf" stroke="#d08a2c"/>
  <text x="346" y="265" font-size="15" font-weight="bold" fill="#2b3440" stroke="none">D</text>
  <text x="376" y="265" font-size="13" fill="#2b3440" stroke="none">K<tspan baseline-shift="-24%" font-size="9.5">d</tspan><tspan baseline-shift="0"> · de(t)/dt</tspan></text>

  <!-- merge PID outputs -->
  <line x1="526" y1="140" x2="600" y2="140"/>
  <line x1="526" y1="200" x2="600" y2="200"/>
  <line x1="526" y1="260" x2="600" y2="260"/>
  <line x1="600" y1="140" x2="600" y2="260"/>
  <line x1="600" y1="200" x2="608" y2="200" marker-end="url(#ar)"/>

  <!-- summing junction 2 -->
  <circle cx="626" cy="200" r="18" fill="#d6e8fb" stroke="#2b6cb0"/>
  <text x="626" y="206" font-size="17" text-anchor="middle" fill="#2b3440" stroke="none">Σ</text>
  <text x="600" y="196" font-size="13" fill="#2b3440" stroke="none">+</text>
  <text x="642" y="190" font-size="13" fill="#2b3440" stroke="none">+</text>

  <!-- plant -->
  <line x1="644" y1="200" x2="680" y2="200" marker-end="url(#ar)"/>
  <rect x="680" y="180" width="96" height="40" rx="4" fill="#a8e0b6" stroke="#2f855a"/>
  <text x="728" y="205" font-size="14" text-anchor="middle" fill="#2b3440" stroke="none">被控对象</text>

  <!-- output node (outside the plant), then split to output + feedback -->
  <line x1="776" y1="200" x2="816" y2="200"/>
  <circle cx="816" cy="200" r="2.6" fill="#2b3440" stroke="none"/>
  <line x1="816" y1="200" x2="866" y2="200" marker-end="url(#ar)"/>
  <text x="872" y="205" font-size="14" fill="#2b3440" stroke="none">输出</text>

  <!-- feedback -->
  <line x1="816" y1="200" x2="816" y2="330"/>
  <line x1="816" y1="330" x2="175" y2="330"/>
  <line x1="175" y1="330" x2="175" y2="218" marker-end="url(#ar)"/>
</svg>
