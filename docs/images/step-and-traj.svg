  </defs>
  <rect x="0" y="0" width="820" height="340" fill="#ffffff"/>

  <!-- ===== left: step response ===== -->
  <line x1="90" y1="292" x2="90" y2="52" marker-end="url(#ax)"/>
  <text x="72" y="52" font-size="17" font-style="italic" fill="#2b3440" stroke="none">θ</text>
