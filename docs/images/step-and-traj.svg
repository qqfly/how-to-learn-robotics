  <text x="54" y="165" font-size="14" font-style="italic" fill="#2b3440" stroke="none">θ<tspan baseline-shift="-24%" font-size="10">t</tspan></text>
  <path d="M96,292 C100,292 132,120 154,116 C170,113 180,172 200,168 C222,164 238,155 264,160 C300,167 330,157 352,160"
