  <text x="228" y="326" font-size="14" fill="#2b3440" stroke="none" text-anchor="middle">阶跃：一步到位，会超调、振荡</text>

  <!-- ===== right: smooth trajectory ===== -->
  <line x1="520" y1="292" x2="520" y2="52" marker-end="url(#ax)"/>
  <text x="502" y="52" font-size="17" font-style="italic" fill="#2b3440" stroke="none">θ</text>
  <line x1="520" y1="292" x2="798" y2="292" marker-end="url(#ax)"/>
  <text x="802" y="298" font-size="16" font-style="italic" fill="#2b3440" stroke="none">t</text>
  <line x1="520" y1="160" x2="784" y2="160" stroke-width="1" stroke-dasharray="4 3" stroke="#8a94a2"/>
  <text x="484" y="165" font-size="14" font-style="italic" fill="#2b3440" stroke="none">θ<tspan baseline-shift="-24%" font-size="10">t</tspan></text>
  <path d="M526,292 C556,291 586,262 640,206 C694,150 748,162 784,160"
        stroke="#2b6cb0" stroke-width="2.6"/>
